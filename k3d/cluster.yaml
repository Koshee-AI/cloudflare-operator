apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: koshee-cf-operator
servers: 1
agents: 1
image: rancher/k3s:v1.28.5-k3s1
registries:
  config: |
    mirrors:
      "koshee-dev-zot:5000":
        endpoint:
          - http://koshee-dev-zot:5000
ports:
  - port: 17080:80
    nodeFilters: [loadbalancer]
  - port: 17443:443
    nodeFilters: [loadbalancer]
network: k3d-shared
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters: [server:*]
volumes:
  - volume: /tmp/k3d-cloudflare-operator:/var/lib/rancher/k3s/storage
    nodeFilters: [server:*, agent:*]
