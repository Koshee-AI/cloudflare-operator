apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: tunnelbinding-sample
subjects:
  - name: whoami-test
    spec:
      fqdn: whoami-test.example.com
      target: http://svc-1.namespace.cluster.local:8080
      caPool: custom
      noTlsVerify: false
tunnelRef:
  kind: ClusterTunnel
  name: clustertunnel-sample
  # Optional: reference a Secret in the operator namespace for Cloudflare API credentials.
  # Prevents finalizer deadlocks during namespace deletion when the namespace-scoped
  # Secret is deleted before the TunnelBinding finalizer runs.
  # credentialSecretRef:
  #   name: cloudflare-api-credentials
  #   namespace: cloudflare-operator-system
