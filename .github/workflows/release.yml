name: Build and Push Image

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.rust'
      - '.github/workflows/release.yml'
  create:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Comma-separated build platforms'
        required: false
        default: 'linux/arm64'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: koshee-ai/cloudflare-operator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.rust
          platforms: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platforms || (startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/arm64') }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate CRD installer YAML
        if: startsWith(github.ref, 'refs/tags/')
        uses: dtolnay/rust-toolchain@stable

      - name: Build installer manifests
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cargo run --bin crdgen > dist/cloudflare-operator.crds.yaml
          mkdir -p dist

      - name: Publish installer to release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload ${{ github.ref_name }} dist/*.yaml
        env:
          GH_TOKEN: ${{ github.token }}
